syntax = "proto3";
import "extensionlist.proto";

message Index {
  // Display name of the store (e.g. "Antsy's Epic Store").
  string name = 1;

  // Short identifier used to represent the store (e.g. "AES").
  string badgeLabel = 2;

  // Public signing key used to verify extension authenticity.
  string signingKey = 3;

  // Contact and community information for the store.
  Contact contact = 4;

  // List of all extensions published by this store, or a URL linking to a separate ExtensionList proto file.
  oneof extension_list_or_url {
    ExtensionList extensionList = 5;
    string extensionListUrl = 6;
  }
}